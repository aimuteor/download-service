# Automated Download Service Configuration
# All settings can be configured here - no code changes needed

general:
  data_dir: "./data"                    # Base directory for downloaded files
  log_dir: "./logs"                     # Directory for log files
  log_level: "INFO"                    # DEBUG, INFO, WARNING, ERROR
  download_interval_minutes: 5         # Interval between download cycles
  max_retries: 3                       # Number of retry attempts for failed downloads
  retry_delay_seconds: 30              # Delay between retries
  timezone: "UTC"                      # Default timezone for datetime operations

# Default destination settings (can be overridden per source)
destination_defaults:
  date_dir_pattern: "{dataDir}/{YYYYMMDD}"
  output_timezone: "UTC"
  include_hhmm_dir: false
  dir_array: true                      # true = create subdir for var, false = no subdir
  dir_array_key: "var1"                # which var to use for directory name

archive:
  enabled: true
  max_age_days: 1095                   # Archive files older than 3 years (365*3)
  archive_dir: "./archive"             # Directory for archived files
  check_interval_hours: 24             # How often to check for files to archive

# Download sources configuration
sources:
  # Example HTTP source with multiple variables
  - name: "sensor_http"
    type: "http"
    protocol: "https"
    host: "api.example.com"
    port: 443
    path: "/api/v1/download"
    filename_pattern: "sensor_{var1}_{var2}_{YYYYMMDDHHMM}.dat"
    method: "POST"
    force_download: false
    # Variable arrays for filename substitution (each varN_array corresponds to {varN})
    var1_array: ["temp", "humid", "pressure"]
    var2_array: ["day", "night"]
    auth_type: "bearer"
    auth_credentials:
      token: "your-token-here"
    post_data:
      type: "sensor"
      format: "binary"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 5
      offset_minutes: 0
      lookback_minutes: 60
    destination:
      subdir: "sensor_data"
      # dir_array: true (default from destination_defaults)
      # Files will be: data/20260619/sensor_data/temp/sensor_temp_day_202606191430.dat

  # Example: dir_array: false - files go directly under subdir
  - name: "flat_output"
    type: "http"
    protocol: "https"
    host: "api.example.com"
    port: 443
    path: "/data"
    filename_pattern: "data_{var1}_{YYYYMMDDHHMM}.dat"
    method: "GET"
    force_download: false
    var1_array: ["typeA", "typeB", "typeC"]
    auth_type: "none"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 10
      offset_minutes: 1
      lookback_minutes: 60
    destination:
      subdir: "flat_data"
      dir_array: false  # Override default - files go directly under subdir
      # Files will be: data/20260619/flat_data/data_typeA_202606191430.dat

  # Example: Static filename source (file doesn't change with datetime)
  - name: "static_radar"
    type: "http"
    protocol: "https"
    host: "radar.example.com"
    port: 443
    path: "/images"
    filename_pattern: "radar_latest.jpg"  # Static filename (no datetime)
    method: "GET"
    force_download: true               # MUST be true for static files
    var1_array: ["latest"]
    auth_type: "none"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 5
      offset_minutes: 0
      lookback_minutes: 5
    destination:
      subdir: "radar_static"
      include_hhmm_dir: true
      dir_array: false
      # Files will be: data/20260619/radar_static/1645/radar_latest.jpg

  # Example: Using dir_array_key to specify which var to use for directory
  - name: "multi_var_dir"
    type: "http"
    protocol: "https"
    host: "api.example.com"
    port: 443
    path: "/data"
    filename_pattern: "report_{var1}_{var2}_{YYYYMMDDHHMM}.pdf"
    method: "GET"
    force_download: false
    # var1 = region, var2 = report_type
    var1_array: ["us", "eu", "asia"]
    var2_array: ["daily", "weekly", "monthly"]
    auth_type: "none"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 60
      offset_minutes: 0
      lookback_minutes: 120
    destination:
      subdir: "reports"
      dir_array: true
      dir_array_key: "var2"  # Use var2 (report_type) for directory structure
      # Files will be: data/20260619/reports/daily/report_us_daily_202606191200.pdf
      #                data/20260619/reports/weekly/report_us_weekly_202606191200.pdf
      # etc.

  # Example: FTP source with wildcard support
  - name: "ftp_radar"
    type: "ftp"
    host: "ftp.example.com"
    port: 21
    path: "/radar/data"
    filename_pattern: "radar_*.jpg"  # Wildcard pattern - downloads all matching files
    method: "GET"
    force_download: false
    auth_type: "basic"
    auth_credentials:
      username: "anonymous"
      password: "anonymous@example.com"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 10
      offset_minutes: 1
      lookback_minutes: 60
    destination:
      subdir: "radar_ftp"
      dir_array: false
      # Files will be: data/20260619/radar_ftp/radar_202606181630.jpg (all matching files)
