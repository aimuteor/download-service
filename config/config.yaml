# Automated Download Service Configuration
# All settings can be configured here - no code changes needed

general:
  data_dir: "./data"                    # Base directory for downloaded files
  log_dir: "./logs"                     # Directory for log files
  log_level: "INFO"                    # DEBUG, INFO, WARNING, ERROR
  download_interval_minutes: 5         # Interval between download cycles
  max_retries: 3                       # Number of retry attempts for failed downloads
  retry_delay_seconds: 30              # Delay between retries
  timezone: "UTC"                      # Default timezone for datetime operations

# Default destination settings (can be overridden per source)
destination_defaults:
  date_dir_pattern: "{dataDir}/{YYYYMMDD}"
  output_timezone: "UTC"
  include_hhmm_dir: false

archive:
  enabled: true
  max_age_days: 1095                   # Archive files older than 3 years (365*3)
  archive_dir: "./archive"             # Directory for archived files
  check_interval_hours: 24             # How often to check for files to archive

# Download sources configuration
sources:
  # Example HTTP source with GET
  - name: "radar_http_tcr"
    type: "http"
    protocol: "https"
    host: "example.com"
    port: 443
    path: "/data/radar"
    filename_pattern: "radar_tcr_{YYYYMMDDHHMM}.jpg"
    method: "GET"
    force_download: false              # Set true to re-download even if file exists
    auth_type: "basic"                 # none, basic, bearer, api_key
    auth_credentials:
      username: ""
      password: ""
    headers:
      User-Agent: "DownloadService/1.0"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "Asia/Hong_Kong"       # HKT = UTC+8
      interval_minutes: 10
      offset_minutes: 1
      lookback_minutes: 60
    destination:
      subdir: "radar_img"
      var1_array: ["tcr", "tms", "cch"]  # Variables to substitute in filename

  # Example HTTP source with POST
  - name: "sensor_http_post"
    type: "http"
    protocol: "https"
    host: "api.example.com"
    port: 443
    path: "/api/v1/download"
    filename_pattern: "sensor_{var1}_{YYYYMMDDHHMM}.dat"
    method: "POST"
    force_download: false
    auth_type: "bearer"
    auth_credentials:
      token: "your-token-here"
    post_data:
      type: "sensor"
      format: "binary"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 5
      offset_minutes: 0
      lookback_minutes: 60
    destination:
      subdir: "sensor_data"
      var1_array: ["temp", "humid", "pressure"]

  # Example SFTP source
  - name: "satellite_sftp"
    type: "sftp"
    host: "sftp.example.com"
    port: 22
    path: "/data/satellite"
    filename_pattern: "sat_{YYYYMMDDHHMM}.nc"
    force_download: false
    auth_type: "key"                   # key or password
    auth_credentials:
      username: "download"
      key_file: "~/.ssh/id_rsa"
      password: ""                     # Optional, for key encryption
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 15
      offset_minutes: 5
      lookback_minutes: 120
    destination:
      subdir: "satellite"
      var1_array: ["g16", "g17"]

  # Example: Static filename source (file doesn't change with datetime)
  # This source will re-download the same file every time
  - name: "static_radar"
    type: "http"
    protocol: "https"
    host: "radar.example.com"
    port: 443
    path: "/images"
    filename_pattern: "radar_latest.jpg"  # Static filename (no datetime)
    method: "GET"
    force_download: true               # MUST be true for static files
    auth_type: "none"
    datetime_config:
      pattern: "%Y%m%d%H%M"           # Still needed for path organization
      timezone: "UTC"
      interval_minutes: 5
      offset_minutes: 0
      lookback_minutes: 5             # Short lookback for frequent updates
    destination:
      subdir: "radar_static"
      var1_array: ["latest"]
      include_hhmm_dir: true            # Add {HHMM} subdirectory

  # Example: Source with include_hhmm_dir for minute-level organization
  - name: "minute_data"
    type: "http"
    protocol: "https"
    host: "data.example.com"
    port: 443
    path: "/reports"
    filename_pattern: "report_{YYYYMMDDHHMM}.pdf"
    method: "GET"
    force_download: false
    auth_type: "none"
    datetime_config:
      pattern: "%Y%m%d%H%M"
      timezone: "UTC"
      interval_minutes: 1
      offset_minutes: 0
      lookback_minutes: 10
    destination:
      subdir: "reports"
      var1_array: ["report"]
      include_hhmm_dir: true            # Path will be: data/20260619/reports/1030/report/
