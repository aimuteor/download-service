<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Status Monitor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: #16213e;
            border-radius: 10px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #00d9ff;
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .last-updated {
            color: #888;
            font-size: 0.9rem;
        }
        
        .refresh-btn {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .refresh-btn:hover {
            background: #00b8d9;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #16213e;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #888;
        }
        
        .stat-success .stat-value { color: #00ff88; }
        .stat-error .stat-value { color: #ff4444; }
        .stat-total .stat-value { color: #00d9ff; }
        
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }
        
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .card.error {
            border-color: #ff4444;
            animation: pulse-red 2s infinite;
        }
        
        .card.warning {
            border-color: #ffaa00;
        }
        
        .card.success {
            border-color: #00ff88;
        }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            50% { box-shadow: 0 0 20px 5px rgba(255, 68, 68, 0.6); }
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .card-type {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 3px;
            background: #0f3460;
            color: #888;
        }
        
        .card-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-success { background: #00ff88; color: #1a1a2e; }
        .status-error { background: #ff4444; color: white; }
        .status-unknown { background: #888; color: #1a1a2e; }
        
        .card-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .card-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        
        .card-label {
            color: #888;
        }
        
        .card-value {
            font-weight: 500;
        }
        
        .card-value.error-text {
            color: #ff4444;
        }
        
        .card-value.success-text {
            color: #00ff88;
        }
        
        .card-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #0f3460;
        }
        
        .mini-stat {
            text-align: center;
        }
        
        .mini-stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .mini-stat-label {
            font-size: 0.7rem;
            color: #888;
        }
        
        .error-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #0f3460;
        }
        
        .error-toggle {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            width: 100%;
            padding: 5px 0;
        }
        
        .error-toggle:hover {
            color: #ff4444;
        }
        
        .error-list {
            display: none;
            margin-top: 10px;
            background: #0f0f1a;
            border-radius: 5px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .error-list.show {
            display: block;
        }
        
        .error-item {
            padding: 8px;
            margin-bottom: 5px;
            background: #1a1a2e;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        
        .error-time {
            color: #888;
            font-size: 0.75rem;
        }
        
        .error-message {
            color: #ff6b6b;
            margin-top: 3px;
        }
        
        .no-data {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #00d9ff;
        }
        
        .chevron {
            transition: transform 0.2s;
        }
        
        .chevron.down {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 Download Status Monitor</h1>
        <div class="header-info">
            <span class="last-updated" id="lastUpdated">Loading...</span>
            <button class="refresh-btn" onclick="loadStatus()">Refresh</button>
        </div>
    </div>
    
    <div class="stats-bar" id="statsBar">
        <div class="stat-item stat-success">
            <div class="stat-value" id="totalSuccess">-</div>
            <div class="stat-label">Total Success (24h)</div>
        </div>
        <div class="stat-item stat-error">
            <div class="stat-value" id="totalFailed">-</div>
            <div class="stat-label">Total Failed (24h)</div>
        </div>
        <div class="stat-item stat-total">
            <div class="stat-value" id="totalRate">-</div>
            <div class="stat-label">Success Rate</div>
        </div>
    </div>
    
    <div class="cards-container" id="cardsContainer">
        <div class="loading">Loading status data...</div>
    </div>
    
    <script>
        const STATUS_FILE = 'status.json';  // Same directory as index.html
        const REFRESH_INTERVAL = 600000; // 10 minutes
        
        let statusData = null;
        
        async function loadStatus() {
            try {
                const response = await fetch(STATUS_FILE);
                if (!response.ok) throw new Error('Failed to load status');
                statusData = await response.json();
                render();
            } catch (error) {
                document.getElementById('cardsContainer').innerHTML = 
                    `<div class="no-data">
                        <p>⚠️ Cannot load status file</p>
                        <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">${error.message}</p>
                        <p style="font-size: 0.8rem; color: #888; margin-top: 5px;">Make sure the download service is running and status.json exists.</p>
                    </div>`;
            }
        }
        
        function render() {
            if (!statusData) return;
            
            // Update last updated time
            const lastUpdated = document.getElementById('lastUpdated');
            const updated = new Date(statusData.last_updated);
            lastUpdated.textContent = `Last updated: ${updated.toLocaleString()}`;
            
            // Calculate totals
            let totalSuccess = 0, totalFailed = 0, total = 0;
            
            const sources = Object.entries(statusData.sources || {});
            sources.forEach(([name, data]) => {
                totalSuccess += data.last_24h_stats?.success || 0;
                totalFailed += data.last_24h_stats?.failed || 0;
                total += data.last_24h_stats?.total || 0;
            });
            
            document.getElementById('totalSuccess').textContent = totalSuccess;
            document.getElementById('totalFailed').textContent = totalFailed;
            document.getElementById('totalRate').textContent = total > 0 
                ? Math.round(totalSuccess / total * 100) + '%' 
                : '-';
            
            // Sort sources: errors first, then by hours since last success
            sources.sort((a, b) => {
                const aData = a[1];
                const bData = b[1];
                
                // Error sources first
                if (aData.current_status === 'error' && bData.current_status !== 'error') return -1;
                if (bData.current_status === 'error' && aData.current_status !== 'error') return 1;
                
                // Then by hours since last success (no success = infinity = last)
                const aHours = aData.hours_since_last_success || 999;
                const bHours = bData.hours_since_last_success || 999;
                if (aHours !== bHours) return bHours - aHours;
                
                return a[0].localeCompare(b[0]);
            });
            
            // Render cards
            const container = document.getElementById('cardsContainer');
            
            if (sources.length === 0) {
                container.innerHTML = '<div class="no-data">No sources found in status file.</div>';
                return;
            }
            
            container.innerHTML = sources.map(([name, data]) => renderCard(name, data)).join('');
        }
        
        function renderCard(name, data) {
            const status = data.current_status || 'unknown';
            const statusLabel = status === 'success' ? 'Success' : status === 'error' ? 'Error' : 'Unknown';
            
            const lastSuccess = data.last_success 
                ? new Date(data.last_success).toLocaleString()
                : 'Never';
            
            const hoursAgo = data.hours_since_last_success;
            const lastSuccessDisplay = hoursAgo !== null && hoursAgo !== undefined
                ? `${lastSuccess} (${hoursAgo}h ago)`
                : lastSuccess;
            
            const type = data.type || 'unknown';
            const todayStats = data.today_stats || {};
            const stats24h = data.last_24h_stats || {};
            
            const cardClass = status === 'error' ? 'error' 
                : hoursAgo !== null && hoursAgo > 1 ? 'warning' 
                : 'success';
            
            const errors = data.recent_errors || [];
            const errorsHtml = errors.length > 0 
                ? `<div class="error-section">
                    <button class="error-toggle" onclick="toggleErrors(this)">
                        <span class="chevron">▶</span> ${errors.length} Recent Error${errors.length > 1 ? 's' : ''}
                    </button>
                    <div class="error-list">
                        ${errors.map(e => `
                            <div class="error-item">
                                <div class="error-time">${new Date(e.time).toLocaleString()}</div>
                                <div class="error-message">${escapeHtml(e.message)}</div>
                                ${e.url ? `<div style="font-size: 0.7rem; color: #666; margin-top: 3px;">${escapeHtml(e.url)}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>`
                : '';
            
            return `
                <div class="card ${cardClass}">
                    <div class="card-header">
                        <span class="card-title">${escapeHtml(name)}</span>
                        <span class="card-type">${escapeHtml(type)}</span>
                    </div>
                    <span class="card-status status-${status}">${statusLabel}</span>
                    <div class="card-body">
                        <div class="card-row">
                            <span class="card-label">Last Success:</span>
                            <span class="card-value ${status === 'error' ? 'error-text' : ''}">${lastSuccessDisplay}</span>
                        </div>
                        <div class="card-row">
                            <span class="card-label">Last Attempt:</span>
                            <span class="card-value">${data.last_attempt ? new Date(data.last_attempt).toLocaleString() : 'Never'}</span>
                        </div>
                        <div class="card-stats">
                            <div class="mini-stat">
                                <div class="mini-stat-value" style="color: #00d9ff">${todayStats.total || 0}</div>
                                <div class="mini-stat-label">Today Total</div>
                            </div>
                            <div class="mini-stat">
                                <div class="mini-stat-value" style="color: #00ff88">${todayStats.success_rate || 0}%</div>
                                <div class="mini-stat-label">Today Rate</div>
                            </div>
                            <div class="mini-stat">
                                <div class="mini-stat-value" style="color: #ff4444">${todayStats.failed || 0}</div>
                                <div class="mini-stat-label">Today Failed</div>
                            </div>
                        </div>
                        <div class="card-stats">
                            <div class="mini-stat">
                                <div class="mini-stat-value">${stats24h.total || 0}</div>
                                <div class="mini-stat-label">24h Total</div>
                            </div>
                            <div class="mini-stat">
                                <div class="mini-stat-value" style="color: ${stats24h.success_rate >= 90 ? '#00ff88' : stats24h.success_rate >= 70 ? '#ffaa00' : '#ff4444'}">${stats24h.success_rate || 0}%</div>
                                <div class="mini-stat-label">24h Rate</div>
                            </div>
                            <div class="mini-stat">
                                <div class="mini-stat-value">${stats24h.failed || 0}</div>
                                <div class="mini-stat-label">24h Failed</div>
                            </div>
                        </div>
                        ${errorsHtml}
                    </div>
                </div>
            `;
        }
        
        function toggleErrors(btn) {
            const list = btn.nextElementSibling;
            const chevron = btn.querySelector('.chevron');
            list.classList.toggle('show');
            chevron.classList.toggle('down');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initial load
        loadStatus();
        
        // Auto refresh
        setInterval(loadStatus, REFRESH_INTERVAL);
    </script>
</body>
</html>
