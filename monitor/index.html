<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Status</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 10px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .header h1 {
            font-size: 1.2rem;
            color: #00d9ff;
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.85rem;
            color: #888;
        }
        
        .refresh-btn {
            background: #00d9ff;
            color: #0f0f1a;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .summary-bar {
            display: flex;
            gap: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        
        .summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .summary-value { font-weight: bold; font-size: 1rem; }
        .summary-label { color: #888; }
        .success-color { color: #00ff88; }
        .error-color { color: #ff4444; }
        .warning-color { color: #ffaa00; }
        
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 8px;
        }
        
        .card {
            background: #1a1a2e;
            border-radius: 6px;
            padding: 10px;
            border-left: 4px solid #444;
            transition: all 0.3s;
        }
        
        .card.error {
            border-left-color: #ff4444;
            animation: pulse-error 2s infinite;
        }
        
        .card.warning {
            border-left-color: #ffaa00;
        }
        
        .card.success {
            border-left-color: #00ff88;
        }
        
        @keyframes pulse-error {
            0%, 100% { background: #1a1a2e; }
            50% { background: #2a1a1e; }
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        
        .source-name {
            font-weight: bold;
            color: #00d9ff;
            font-size: 0.9rem;
        }
        
        .source-name:hover {
            text-decoration: underline;
        }
        
        .source-details {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
            word-break: break-all;
        }
        
        .source-filename {
            font-size: 0.7rem;
            color: #666;
            margin-top: 2px;
            font-family: monospace;
            word-break: break-all;
        }
        
        .status-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        
        .badge-success { background: #00ff88; color: #0f0f1a; }
        .badge-error { background: #ff4444; color: white; }
        .badge-warning { background: #ffaa00; color: #0f0f1a; }
        .badge-unknown { background: #666; color: white; }
        
        .card-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.8rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-val {
            font-weight: bold;
        }
        
        .stat-lbl {
            color: #666;
            font-size: 0.7rem;
        }
        
        .last-success {
            margin-top: 6px;
            font-size: 0.75rem;
            color: #888;
        }
        
        .error-msg {
            margin-top: 5px;
            font-size: 0.75rem;
            color: #ff6b6b;
            padding: 4px 8px;
            background: #2a1a1e;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .error-msg:hover {
            background: #3a2020;
        }
        
        /* Modal for source details */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 20px;
            max-width: 750px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        
        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d9ff;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-close:hover { color: #fff; }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a3e;
            font-size: 0.85rem;
        }
        
        .detail-label {
            color: #888;
            flex-shrink: 0;
        }
        
        .detail-value {
            color: #e0e0e0;
            word-break: break-all;
            text-align: right;
            margin-left: 10px;
        }
        
        .detail-value.masked {
            color: #666;
            font-style: italic;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📡 Download Status</h1>
        <div class="header-info">
            <span id="lastUpdated">Loading...</span>
            <button class="refresh-btn" onclick="loadStatus()">Refresh</button>
        </div>
    </div>
    
    <div class="summary-bar" id="summaryBar">
        <div class="summary-item">
            <span class="summary-value success-color" id="totalSuccess">-</span>
            <span class="summary-label">Success (24h)</span>
        </div>
        <div class="summary-item">
            <span class="summary-value error-color" id="totalFailed">-</span>
            <span class="summary-label">Failed (24h)</span>
        </div>
        <div class="summary-item">
            <span class="summary-value" id="totalRate">-</span>
            <span class="summary-label">Success Rate</span>
        </div>
        <div class="summary-item">
            <span class="summary-value" id="totalSources">-</span>
            <span class="summary-label">Sources</span>
        </div>
    </div>
    
    <div class="cards-container" id="cardsContainer">
        <div class="loading">Loading...</div>
    </div>
    
    <!-- Modal for source details -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Source Details</span>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script>
        const STATUS_FILE = 'status.json';
        const REFRESH_INTERVAL = 600000; // 10 minutes
        
        let statusData = null;
        let sourceConfigs = {};  // Store source config details
        
        async function loadStatus() {
            try {
                const response = await fetch(STATUS_FILE);
                if (!response.ok) throw new Error('Failed to load');
                statusData = await response.json();
                render();
            } catch (error) {
                document.getElementById('cardsContainer').innerHTML = 
                    `<div class="no-data">⚠️ Cannot load status: ${error.message}</div>`;
            }
        }
        
        function render() {
            if (!statusData) return;
            
            // Update last updated
            const updated = new Date(statusData.last_updated);
            document.getElementById('lastUpdated').textContent = 
                `Updated: ${updated.toLocaleTimeString()}`;
            
            // Calculate totals
            let totalSuccess = 0, totalFailed = 0, total = 0;
            const sources = Object.entries(statusData.sources || {});
            
            sources.forEach(([name, data]) => {
                totalSuccess += data.last_24h_stats?.success || 0;
                totalFailed += data.last_24h_stats?.failed || 0;
                total += data.last_24h_stats?.total || 0;
            });
            
            document.getElementById('totalSuccess').textContent = totalSuccess;
            document.getElementById('totalFailed').textContent = totalFailed;
            document.getElementById('totalRate').textContent = total > 0 
                ? Math.round(totalSuccess / total * 100) + '%' : '-';
            document.getElementById('totalSources').textContent = sources.length;
            
            // Sort: errors first, then by hours since last success
            sources.sort((a, b) => {
                if (a[1].current_status === 'error' && b[1].current_status !== 'error') return -1;
                if (b[1].current_status === 'error' && a[1].current_status !== 'error') return 1;
                const aHours = a[1].hours_since_last_success || 999;
                const bHours = b[1].hours_since_last_success || 999;
                if (aHours !== bHours) return bHours - aHours;
                return a[0].localeCompare(b[0]);
            });
            
            // Render cards
            const container = document.getElementById('cardsContainer');
            if (sources.length === 0) {
                container.innerHTML = '<div class="no-data">No sources found.</div>';
                return;
            }
            
            container.innerHTML = sources.map(([name, data]) => renderCard(name, data)).join('');
        }
        
        function renderCard(name, data) {
            const status = data.current_status || 'unknown';
            const hoursAgo = data.hours_since_last_success;
            
            // Determine card class
            let cardClass = 'success';
            let badgeClass = 'badge-success';
            let badgeText = 'OK';
            
            if (status === 'error') {
                cardClass = 'error';
                badgeClass = 'badge-error';
                badgeText = 'ERROR';
            } else if (hoursAgo !== null && hoursAgo > 1) {
                cardClass = 'warning';
                badgeClass = 'badge-warning';
                badgeText = hoursAgo > 24 ? 'STALE' : 'WARN';
            } else if (status === 'unknown') {
                badgeClass = 'badge-unknown';
                badgeText = 'UNKNOWN';
            }
            
            const stats24h = data.last_24h_stats || {};
            const successRate = stats24h.success_rate || 0;
            const total = stats24h.total || 0;
            const failed = stats24h.failed || 0;
            
            // Last success time display
            let lastSuccessText = 'Never';
            if (data.last_success) {
                const d = new Date(data.last_success);
                const diff = hoursAgo !== null ? hoursAgo : 0;
                if (diff < 1) {
                    lastSuccessText = `${Math.round(diff * 60)}m ago`;
                } else if (diff < 24) {
                    lastSuccessText = `${Math.round(diff)}h ago`;
                } else {
                    lastSuccessText = d.toLocaleDateString();
                }
            }
            
            // Error display
            let errorHtml = '';
            const errors = data.recent_errors || [];
            if (errors.length > 0) {
                const lastError = errors[errors.length - 1];
                errorHtml = `<div class="error-msg" title="Click for details" onclick="showLastError('${escapeHtml(name)}')">
                    ⚠ ${escapeHtml(lastError.message.substring(0, 50))}${lastError.message.length > 50 ? '...' : ''}
                </div>`;
            }
            
            return `
                <div class="card ${cardClass}">
                    <div class="card-header" onclick="showDetails('${escapeHtml(name)}')">
                        <span class="source-name">${escapeHtml(name)}</span>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="card-stats">
                        <div class="stat">
                            <div class="stat-val">${total}</div>
                            <div class="stat-lbl">Total</div>
                        </div>
                        <div class="stat">
                            <div class="stat-val success-color">${successRate}%</div>
                            <div class="stat-lbl">Success</div>
                        </div>
                        <div class="stat">
                            <div class="stat-val error-color">${failed}</div>
                            <div class="stat-lbl">Failed</div>
                        </div>
                    </div>
                    <div class="last-success">
                        Last success: ${lastSuccessText}
                    </div>
                    ${errorHtml}
                </div>
            `;
        }
        
        function showDetails(name) {
            const data = statusData?.sources?.[name];
            if (!data) return;
            
            // Build details HTML
            let html = '<div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">' + escapeHtml(name) + '</span></div>';
            html += '<div class="detail-row"><span class="detail-label">Type</span><span class="detail-value">' + escapeHtml(data.type || 'N/A') + '</span></div>';
            html += '<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value">' + escapeHtml(data.current_status || 'unknown') + '</span></div>';
            
            if (data.last_success) {
                html += '<div class="detail-row"><span class="detail-label">Last Success</span><span class="detail-value">' + new Date(data.last_success).toLocaleString() + '</span></div>';
            }
            if (data.last_attempt) {
                html += '<div class="detail-row"><span class="detail-label">Last Attempt</span><span class="detail-value">' + new Date(data.last_attempt).toLocaleString() + '</span></div>';
            }
            
            // 24h stats
            const stats = data.last_24h_stats || {};
            const statTotal = stats.total || 0;
            const statSuccess = stats.success || 0;
            const statRate = stats.success_rate || 0;
            html += '<div class="detail-row"><span class="detail-label">24h Stats</span><span class="detail-value">' + statSuccess + ' / ' + statTotal + ' (' + statRate + '%)</span></div>';
            
            // Show config details if available
            // Show source config details on card
            const config = sourceConfigs[name];
            if (config) {
                const host = config.host || '';
                const path = config.path || '/';
                const filename = config.filename_pattern || '';
                // Format: host + path + filename, avoiding double slashes
                let fileLocation = host;
                if (path.startsWith('/')) {
                    fileLocation += path;
                } else {
                    fileLocation += '/' + path;
                }
                if (filename && !filename.startsWith('/')) {
                    fileLocation += filename;
                } else if (filename) {
                    fileLocation += filename.substring(1);
                }
                // Clean up any double slashes
                fileLocation = fileLocation.replace(/\/+/g, '/');
                html += '<div class="detail-row" style="flex-direction: column; align-items: flex-start;">';
                html += '<span class="detail-label">File Location</span>';
                html += '<span class="detail-value" style="font-size: 0.8rem; word-break: break-all; margin-left: 0; margin-top: 5px;">' + escapeHtml(fileLocation) + '</span>';
                html += '</div>';
            }
            
            // Recent errors
            const errors = data.recent_errors || [];
            if (errors.length > 0) {
                html += '<div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #333;"><strong style="color: #ff6b6b;">Recent Errors:</strong></div>';
                errors.slice(-5).reverse().forEach(e => {
                    html += '<div class="detail-row" style="flex-direction: column; align-items: flex-start;">';
                    html += '<span class="detail-label">' + new Date(e.time).toLocaleString() + '</span>';
                    html += '<span class="detail-value error-color" style="margin-left: 0; margin-top: 5px;">' + escapeHtml(e.message) + '</span>';
                    if (e.url) {
                        html += '<span class="detail-value" style="font-size: 0.75rem; color: #666; margin-left: 0;">' + escapeHtml(e.url) + '</span>';
                    }
                    html += '</div>';
                });
            }
            
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').classList.add('show');
        }
        
        function showLastError(name) {
            showDetails(name);
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        // Close modal on background click
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load source configs from config (if available via API)
        async function loadSourceConfigs() {
            try {
                const resp = await fetch('sources.json');
                if (resp.ok) {
                    const configs = await resp.json();
                    configs.forEach(c => sourceConfigs[c.name] = c);
                }
            } catch (e) {
                // Config not available, continue without it
            }
        }
        
        // Initial load
        loadStatus();
        loadSourceConfigs();
        
        // Auto refresh
        setInterval(loadStatus, REFRESH_INTERVAL);
    </script>
</body>
</html>
